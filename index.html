function getTarget(attacker, potentialTargets) {
    // 1. Player Selection
    if (attacker.isPlayer && battleState.selectedTargetId) {
        const selected = potentialTargets.find(u => u.battleId === battleState.selectedTargetId);
        if (selected) return selected;
    }

    // 2. Elemental Advantage Filter
    const advantageTargets = potentialTargets.filter(t => getElementalMultiplier(attacker.element, t.element) > 1.0);
    const candidates = advantageTargets.length > 0 ? advantageTargets : potentialTargets;

    // 3. Selection Logic
    if (attacker.isPlayer) {
        // Player Auto: Random among candidates
        return candidates[Math.floor(Math.random() * candidates.length)];
    } else {
        // Enemy AI
        if (attacker.aiType === AI_TYPES.LOWEST_HP_DEF) {
            return candidates.reduce((p, c) => (p.currentHp * p.stats.def < c.currentHp * c.stats.def ? p : c));
        } else if (attacker.aiType === AI_TYPES.HIGHEST_ATK) {
            return candidates.reduce((p, c) => (p.stats.atk > c.stats.atk ? p : c));
        } else {
            return candidates[Math.floor(Math.random() * candidates.length)];
        }
    }
}

async function processUnitDeath(unit) {
    if (unit.currentHp > 0) return;

    // 1. Check Self-Revive / Death Skills
    const revived = await checkDeathAbilities(unit);
    if (revived) return;

    // 2. Check External Revive (Perfect Cure)
    const allies = unit.isPlayer ? battleState.playerUnits : battleState.enemyUnits;
    const callum = allies.find(u => u.id === 7 && u.currentHp > 0 && !u.passiveUsed);
    
    if (callum && callum.battleId !== unit.battleId) {
        await showCutIn(callum, '完全治療');
        const healAmount = Math.floor(unit.stats.hp * 0.5);
        unit.currentHp = Math.floor(unit.stats.hp * 0.5);
        logBattleMessage(`${callum.name}の完全治療！${unit.name}が復活した！`);
        updateUnitUI(unit);
        const unitEl = document.getElementById(`unit-${unit.battleId}`);
        playEffect(unitEl, 'heal');
        showDamageNumber(unitEl, healAmount, 'heal');
        callum.passiveUsed = true;
        if (unitEl) unitEl.classList.remove('defeated');
        return;
    }

    // 3. Final Death
    logBattleMessage(`<span class="info">${unit.name} は倒れた！</span>`);
    const unitEl = document.getElementById(`unit-${unit.battleId}`);
    if (unitEl) unitEl.classList.add('defeated');
    if (unit.battleId === battleState.selectedTargetId) {
        battleState.selectedTargetId = null;
        // ターゲットが死んだら、ターゲット表示を消す
        if (unitEl) unitEl.classList.remove('is-targeted');
    }
}

async function checkDeathAbilities(unit) {
  if (!unit) return false;
  const unitEl = document.getElementById(`unit-${unit.battleId}`);
  
  // Gira (ID: 13) Passive: 祟り神の降臨
  if (unit.id === 13 && !unit.passiveUsed) {
      unit.passiveUsed = true;
      await showCutIn(unit, '祟り神の降臨');
      unit.currentHp = 1;
      logBattleMessage(`${unit.name}に祟り神が降臨した...！`);
      updateUnitUI(unit);
      if (unitEl) {
          unitEl.classList.remove('defeated');
          playEffect(unitEl, 'dark');
      }
      
      const enemies = unit.isPlayer ? battleState.enemyUnits : battleState.playerUnits;
      for (const e of enemies) {
          if (e.currentHp > 0) await addStatusEffect(e, 'weakness', 3);
      }
      return true;
  }

  // Bella (ID: 9) Passive: Nuclear Fission
  if (unit.id === 9 && !unit.passiveUsed) {
      unit.passiveUsed = true;
      updateUnitUI(unit);
      await sleep(400 / battleSpeedMultiplier);

      await showCutIn(unit, '核分裂');
      unit.currentHp = 1;
      logBattleMessage(`${unit.name}は核分裂を起こした！`);
      updateUnitUI(unit);
      if (unitEl) {
          unitEl.classList.remove('defeated');
          playEffect(unitEl, 'impact');
      }
      
      const enemies = unit.isPlayer ? battleState.enemyUnits : battleState.playerUnits;
      const deathQueue = [];
      for (const enemy of enemies) {
          if (enemy.currentHp > 0) {
              const enemyEl = document.getElementById(`unit-${enemy.battleId}`);
              const dmg = Math.floor(unit.stats.atk * 1.5);
              enemy.currentHp = Math.max(0, enemy.currentHp - dmg);
              logBattleMessage(`${enemy.name}に<span class="damage">${dmg}</span>の爆発ダメージ！`);
              updateUnitUI(enemy);
              showDamageNumber(enemyEl, dmg);
              playEffect(enemyEl, 'impact');
              if (enemy.currentHp <= 0) {
                  deathQueue.push(enemy);
              }
          }
      }
      for (const deadUnit of deathQueue) {
          await processUnitDeath(deadUnit);
      }
      return true;
  }
  return false;
}

async function runBattleSequence() {
  document.getElementById('battleActionBtn').disabled = true;
  document.getElementById('retireBattleBtn').disabled = true; // Disable during sequence execution to prevent race conditions
  document.getElementById('closeBattleBtn').disabled = true;
  logBattleMessage(`<span class="info">戦闘開始！</span>`);

  await triggerOnBattleStartAbilities();
  if (battleState.isFinished) return;

  const turnQueue = [...battleState.playerUnits, ...battleState.enemyUnits].sort((a, b) => b.stats.spd - a.stats.spd);
  let turnCount = 1;

  while (!battleState.isFinished) {
    logBattleMessage(`<span class="info">--- ターン ${turnCount} ---</span>`);

    for (const attacker of turnQueue) {
      if (battleState.isFinished || attacker.currentHp <= 0) continue;
      let canAct = true;
      attacker.isAdvantageForced = false; // Reset flag for Gira

      // Equipment: Conditional Heal (Regen if low HP)
      if (attacker.equipment && attacker.equipment.effect.type === 'conditional_heal') {
        if (attacker.currentHp <= attacker.stats.hp * attacker.equipment.effect.threshold) {
           const healAmt = Math.floor(attacker.stats.hp * attacker.equipment.effect.val);
           attacker.currentHp = Math.min(attacker.stats.hp, attacker.currentHp + healAmt);
           logBattleMessage(`${attacker.name}はロザリオの光で ${healAmt} 回復した。`);
           updateUnitUI(attacker);
        }
      }

      const attackerEl = document.getElementById(`unit-${attacker.battleId}`);
      try {
        attackerEl.classList.add('is-turn-active');
        logBattleMessage(`${attacker.name} のターン。`);
        await sleep(400 / battleSpeedMultiplier);

        // --- STATUS EFFECT HANDLING (START OF TURN) ---
        const effectsCopy = [...attacker.statusEffects]; // Iterate over a copy
        for (const effect of effectsCopy) {
            switch (effect.type) {
                case 'burn': // Fallthrough
                case 'poison':
                    const effectInfo = STATUS_EFFECTS[effect.type];
                    const dotDamage = Math.floor(attacker.stats.hp / 8);
                    attacker.currentHp = Math.max(0, attacker.currentHp - dotDamage);
                    logBattleMessage(`${attacker.name}は<span class="damage">${effectInfo.name}</span>で ${dotDamage} のダメージを受けた！`);
                    updateUnitUI(attacker);
                    showDamageNumber(document.getElementById(`unit-${attacker.battleId}`), dotDamage);
                    const attackerElForDot = document.getElementById(`unit-${attacker.battleId}`);
                    if (attackerElForDot) {
                        attackerElForDot.classList.add('is-taking-damage');
                        setTimeout(() => attackerElForDot.classList.remove('is-taking-damage'), 400);
                    }
                    break;
                case 'paralysis':
                    if (Math.random() < 0.3) {
                        logBattleMessage(`${attacker.name}は<span class="info">麻痺</span>で動けない！`);
                        canAct = false;
                    }
                    break;
                case 'sleep':
                    logBattleMessage(`${attacker.name}は<span class="info">睡眠</span>で眠っている...`);
                    canAct = false;
                    break;
            }
        }

        // Equipment: Regen
        if (attacker.equipment && attacker.equipment.effect.type === 'regen') {
            const regenAmt = Math.floor(attacker.stats.hp * attacker.equipment.effect.val);
            attacker.currentHp = Math.min(attacker.stats.hp, attacker.currentHp + regenAmt);
            // logBattleMessage(`${attacker.name}は徐々に回復している... (+${regenAmt})`);
            updateUnitUI(attacker);
            showDamageNumber(attackerEl, regenAmt, 'heal');
        }

        if (attacker.currentHp <= 0) {
            await processUnitDeath(attacker);
            if (attacker.currentHp <= 0) { // Still dead after revive checks
                canAct = false;
            }
        }

        attacker.statusEffects.forEach(effect => effect.turns--);
        attacker.statusEffects = attacker.statusEffects.filter(effect => effect.turns > 0);
        updateUnitUI(attacker);

        if (checkWinLoss()) break;

        if (!canAct) {
            await sleep(800 / battleSpeedMultiplier);
            continue;
        }

        // Passive: Den Alvaro (ID: 6) Support
        if (attacker.id === 6) {
            const allies = attacker.isPlayer ? battleState.playerUnits : battleState.enemyUnits;
            const livingAllies = allies.filter(u => u.currentHp > 0);
            if (livingAllies.length > 0) {
                let targetAlly = livingAllies[0];
                let minPct = targetAlly.currentHp / targetAlly.stats.hp;
                for (const ally of livingAllies) {
                    const pct = ally.currentHp / ally.stats.hp;
                    if (pct < minPct) {
                        minPct = pct;
                        targetAlly = ally;
                    }
                }
                const healAmt = Math.floor(targetAlly.stats.hp * 0.1);
                if (healAmt > 0 && targetAlly.currentHp < targetAlly.stats.hp) {
                    targetAlly.currentHp = Math.min(targetAlly.stats.hp, targetAlly.currentHp + healAmt);
                    const targetAllyEl = document.getElementById(`unit-${targetAlly.battleId}`);
                    logBattleMessage(`${attacker.name}の支援！${targetAlly.name}のHPが回復！`);
                    updateUnitUI(targetAlly);
                    playEffect(targetAllyEl, 'heal');
                    showDamageNumber(targetAllyEl, healAmt, 'heal');
                }
            }
        }

        // --- ATTACK SEQUENCE ---
        
        // 1. Check for 'before_attack' ability
        let activeAbility = null;
        if (attacker.abilities) {
          for (const ab of attacker.abilities) {
            if (ab.timing === 'before_attack' && Math.random() < (ab.triggerRate || 0)) {
              activeAbility = ab;
              break; // 1ターンに1つの攻撃スキルのみ発動と仮定
            }
          }
        }

        // Check for AoE
        if (activeAbility && activeAbility.isAoe) {
            // --- AOE LOGIC ---
            attackerEl.classList.add('is-attacking');
            await showCutIn(attacker, activeAbility.name);
            await sleep(600 / battleSpeedMultiplier);

            const aoeTargets = (attacker.isPlayer ? battleState.enemyUnits : battleState.playerUnits).filter(u => u.currentHp > 0);
            for (const aoeTarget of aoeTargets) {
                if (aoeTarget.currentHp <= 0) continue;

                const damage = Math.floor(calculateDamage(attacker, aoeTarget) * (activeAbility.damageMult || 0.8));
                let actualDamage = damage;
                
                // Simplified defense check for AoE
                if (aoeTarget.abilities && actualDamage > 0) {
                    for (const ab of aoeTarget.abilities) {
                        if (ab.timing === 'on_defense' && Math.random() < (ab.triggerRate || 0)) {
                            if (aoeTarget.id === 6) { // Den Alvaro
                                actualDamage = Math.floor(actualDamage * 0.7);
                            } else {
                                actualDamage = Math.floor(actualDamage * 0.9);
                            }
                            if (ab.effect?.type === 'status') {
                                await addStatusEffect(attacker, ab.effect.status, ab.effect.turns);
                            }
                        }
                    }
                }

                aoeTarget.currentHp = Math.max(0, aoeTarget.currentHp - actualDamage);
                
                const adv = getElementalMultiplier(attacker.element, aoeTarget.element);
                let advText = adv > 1.0 ? ' <span style="color:var(--gold);font-weight:bold;">WEAK!</span>' : adv < 1.0 ? ' <span style="color:var(--text-dim);font-weight:bold;">RESIST</span>' : '';

                logBattleMessage(`${attacker.name}の${activeAbility.name}！ ${aoeTarget.name}に<span class="damage">${actualDamage}</span>${advText}のダメージ！`);
                const targetEl = document.getElementById(`unit-${aoeTarget.battleId}`);
                updateUnitUI(aoeTarget);
                playEffect(targetEl, attacker.abilityType || 'magic');
                showDamageNumber(targetEl, actualDamage, adv > 1.0 ? 'weak' : 'damage');
                targetEl.classList.add('is-taking-skill-damage');
                setTimeout(() => targetEl.classList.remove('is-taking-skill-damage'), 500);

                if (aoeTarget.currentHp <= 0) {
                    await processUnitDeath(aoeTarget);
                }
                await sleep(150 / battleSpeedMultiplier);
            }
        } else {
            // --- SINGLE TARGET LOGIC ---
        const targets = (attacker.isPlayer ? battleState.enemyUnits : battleState.playerUnits).filter(u => u.currentHp > 0);
        if (targets.length === 0) continue;
        
        const target = getTarget(attacker, targets);
      
        const targetEl = document.getElementById(`unit-${target.battleId}`);
        attackerEl.classList.add('is-attacking');
        await sleep(600 / battleSpeedMultiplier);

        // Passive Activation Check (Visual)
      const isDoraPassiveConditionMet = attacker.id === 1 && attacker.currentHp <= attacker.stats.hp * 0.5;
      if (attacker.id === 1) {
          if (isDoraPassiveConditionMet && !attacker.isPassiveActive) {
            attacker.isPassiveActive = true;
            if (attacker.abilities && attacker.abilities.length > 1) {
              showPassivePopup(attackerEl, `◆ ${attacker.abilities[1].name}`);
              await sleep(1200 / battleSpeedMultiplier);
            }
          } else if (!isDoraPassiveConditionMet && attacker.isPassiveActive) {
            attacker.isPassiveActive = false;
          }
      }

      const isNoaPassiveConditionMet = attacker.id === 2 && attacker.currentHp <= attacker.stats.hp * 0.3;
      if (attacker.id === 2) {
          if (isNoaPassiveConditionMet && !attacker.isPassiveActive) {
            attacker.isPassiveActive = true;
            if (attacker.abilities && attacker.abilities.length > 1) {
              showPassivePopup(attackerEl, `◆ ${attacker.abilities[1].name}`);
              await sleep(1200 / battleSpeedMultiplier);
            }
          } else if (!isNoaPassiveConditionMet && attacker.isPassiveActive) {
            attacker.isPassiveActive = false;
          }
      }
      
      const isRaiPassiveConditionMet = attacker.id === 5 && attacker.currentHp <= attacker.stats.hp * 0.5;
      if (attacker.id === 5) {
          if (isRaiPassiveConditionMet && !attacker.isPassiveActive) {
            attacker.isPassiveActive = true;
            if (attacker.abilities && attacker.abilities.length > 1) {
              showPassivePopup(attackerEl, `◆ ${attacker.abilities[1].name}`);
              await sleep(1200 / battleSpeedMultiplier);
            }
          } else if (!isRaiPassiveConditionMet && attacker.isPassiveActive) {
            attacker.isPassiveActive = false;
          }
      }
      
      const isAsterPassiveConditionMet = attacker.id === 114 && attacker.currentHp <= attacker.stats.hp * 0.3;
      if (attacker.id === 114) {
          if (isAsterPassiveConditionMet && !attacker.isPassiveActive) {
            attacker.isPassiveActive = true;
            if (attacker.abilities && attacker.abilities.length > 1) {
              showPassivePopup(attackerEl, `◆ ${attacker.abilities[1].name}`);
              await sleep(1200 / battleSpeedMultiplier);
            }
          } else if (!isAsterPassiveConditionMet && attacker.isPassiveActive) {
            attacker.isPassiveActive = false;
          }
      }


      // Lloyd (ID: 11) Chemical Contamination
      if (attacker.id === 11 && attacker.currentHp <= attacker.stats.hp * 0.5 && !attacker.passiveUsed) {
          attacker.passiveUsed = true;
          await showCutIn(attacker, '化学物質汚染');
          const enemies = attacker.isPlayer ? battleState.enemyUnits : battleState.playerUnits;
          for (const e of enemies) {
              if (e.currentHp > 0) await addStatusEffect(e, 'poison', 3);
          }
          logBattleMessage(`${attacker.name}は化学物質を撒き散らした！`);
          await sleep(600 / battleSpeedMultiplier);
      }

        // 2. Execute Attack (Normal or Ability)
        let damageMultiplier = 1.0;
        let attackName = '攻撃';
        
      if (activeAbility) {
        await showCutIn(attacker, activeAbility.name);
        attackName = activeAbility.name;
        // スキルごとの倍率設定 (簡易的にIDや名前で分岐、本来はデータに持たせるべき)
        if (attacker.id === 1) damageMultiplier = 2.0;
        if (attacker.id === 103) damageMultiplier = 1.5;
        if (attacker.id === 106) damageMultiplier = 1.1;
        if (attacker.id === 10) damageMultiplier = 1.3;
        if (attacker.id === 13 && activeAbility.name === '圧縮の札') {
            attacker.isAdvantageForced = true;
        }
        if (attacker.id === 113 && activeAbility.name === '虹斬') {
            attacker.isAdvantageForced = true;
        }
      }

        const damage = Math.floor(calculateDamage(attacker, target) * damageMultiplier);
        
        // Apply Damage to Target
        let actualDamage = damage;
        
        // ミリア・ルティス (ID: 14) Passive: 耐え抜く能力
        if (target.id === 14 && actualDamage >= target.currentHp) {
            if (target.endureCount === undefined) target.endureCount = 0;
            if (target.endureCount < 5) {
                const endureChance = 1.0 - (target.endureCount * 0.2);
                if (Math.random() < endureChance) {
                    await showCutIn(target, '耐え抜く能力');
                    actualDamage = 0;
                    target.endureCount++;
                    logBattleMessage(`${target.name}は耐え抜いた！(残り回数: ${5 - target.endureCount})`);
                    playEffect(targetEl, 'guard-vertical');
                }
            }
        }

        // Equipment: Evasion
      if (target.equipment && target.equipment.effect.type === 'evasion' && Math.random() < target.equipment.effect.val) {
          actualDamage = 0;
          logBattleMessage(`${target.name}は攻撃をひらりと回避した！`);
          showPassivePopup(document.getElementById(`unit-${target.battleId}`), "MISS");
      }
      // Equipment: Shield (Nullify Hit)
      else if (target.shieldHits > 0) {
          actualDamage = 0;
          target.shieldHits--;
          logBattleMessage(`${target.name}の人形が身代わりになった！`);
          showPassivePopup(document.getElementById(`unit-${target.battleId}`), "BLOCK");
      }
      // Equipment: Guts
      else if (target.equipment && target.equipment.effect.type === 'guts' && target.guts && actualDamage >= target.currentHp) {
          actualDamage = target.currentHp - 1;
          target.guts = false; // Consume guts
          logBattleMessage(`${target.name}はフェニックスの加護で耐えた！`);
      }
      
        // Landia (ID: 113) Passive: 無能力の意地
        const landiaPassive = target.abilities.find(ab => ab.timing === 'on_skill_defense');
        if (activeAbility && target.id === 113 && landiaPassive) {
            actualDamage = Math.floor(actualDamage * 0.5);
            logBattleMessage(`${target.name}は<span class="ability">${landiaPassive.name}</span>でダメージを50%ブロックした！`);
            playEffect(document.getElementById(`unit-${target.battleId}`), 'guard-vertical');
        }

        // Ability: Defense (on_defense)
        if (target.abilities && actualDamage > 0) {
        for (const ab of target.abilities) {
          if (ab.timing === 'on_defense' && Math.random() < (ab.triggerRate || 0)) {
             await showCutIn(target, ab.name);
             
             if (target.id === 6) { // Den Alvaro
                 actualDamage = Math.floor(actualDamage * 0.7); // 30% Block
                 logBattleMessage(`${target.name}の${ab.name}！ダメージ軽減＆麻痺付与！`);
             } else {
                 actualDamage = Math.floor(actualDamage * 0.9); // 10% Cut
                 logBattleMessage(`${target.name}の${ab.name}！ダメージを軽減！`);
             }
             
             if (ab.effect?.type === 'status') {
                await addStatusEffect(attacker, ab.effect.status, ab.effect.turns);
             }
             playEffect(document.getElementById(`unit-${target.battleId}`), 'guard-vertical');
          }
        }
      }

        target.currentHp = Math.max(0, target.currentHp - actualDamage);

        // Ricardo (ID: 8) Earth Residue Flow
        if (target.id === 8 && target.currentHp === 0 && !target.gutsUsed) {
            target.gutsUsed = true;
            updateUnitUI(target); // Show 0 HP
            await sleep(400 / battleSpeedMultiplier);

            await showCutIn(target, '土残流');
            
            target.currentHp = 1;
            logBattleMessage(`${target.name}は土残流で蘇った！`);
            updateUnitUI(target);
            playEffect(document.getElementById(`unit-${target.battleId}`), 'heal');
            await sleep(400 / battleSpeedMultiplier);

            const counterDmg = Math.floor(target.stats.atk * 3.0);
            attacker.currentHp = Math.max(0, attacker.currentHp - counterDmg);
            
            const attackerEl = document.getElementById(`unit-${attacker.battleId}`);
            playEffect(attackerEl, 'impact');
            attackerEl.classList.add('is-taking-skill-damage');
            setTimeout(() => attackerEl.classList.remove('is-taking-skill-damage'), 500);

            logBattleMessage(`${target.name}の反撃！${attacker.name}に<span class="damage">${counterDmg}</span>のダメージ！`);
            updateUnitUI(attacker);
            if (attacker.currentHp <= 0) {
                await processUnitDeath(attacker);
            }
        }

        // 属性相性エフェクト
      const advantage = getElementalMultiplier(attacker.element, target.element);
      let advText = '';
      let damageType = 'damage';
      if (advantage > 1.0) {
        advText = ' <span style="color:var(--gold);font-weight:bold;">WEAK!</span>';
        showPassivePopup(targetEl, "WEAK!"); // 簡易エフェクト
        damageType = 'weak';
      } else if (advantage < 1.0) {
        advText = ' <span style="color:var(--text-dim);font-weight:bold;">RESIST</span>';
        showPassivePopup(targetEl, "RESIST"); // 簡易エフェクト
      }

        // スキルによる追加効果
        if (activeAbility && activeAbility.effect?.type === 'status') {
            await addStatusEffect(target, activeAbility.effect.status, activeAbility.effect.turns);
        }

      // パッシブ効果: 炎支配 (通常攻撃時)
      if (!activeAbility && attacker.id === 1 && attacker.isPassiveActive) await addStatusEffect(target, 'burn', 2);

      // 装備による追加効果
      if (attacker.equipment && attacker.equipment.effect.type === 'add_status') {
          if (Math.random() < attacker.equipment.effect.chance) {
              await addStatusEffect(target, attacker.equipment.effect.status, 3);
          }
      }
        // Equipment: Drain
      if (actualDamage > 0 && attacker.equipment && attacker.equipment.effect.type === 'drain') {
          const drainAmt = Math.floor(actualDamage * attacker.equipment.effect.val);
          attacker.currentHp = Math.min(attacker.stats.hp, attacker.currentHp + drainAmt);
          updateUnitUI(attacker);
          showDamageNumber(attackerEl, drainAmt, 'heal');
      }

        playEffect(targetEl, activeAbility ? (attacker.abilityType || 'magic') : 'impact');
        logBattleMessage(`${attacker.name} の ${attackName}！ ${target.name} に <span class="damage">${damage}</span>${advText} のダメージ！`);
        updateUnitUI(target);
        const damageClass = activeAbility ? 'is-taking-skill-damage' : 'is-taking-damage';
        const animDuration = activeAbility ? 500 : 400;
        showDamageNumber(targetEl, actualDamage, damageType);
        targetEl.classList.add(damageClass);
        setTimeout(() => targetEl.classList.remove(damageClass), animDuration);

        // Counter Attack (on_hit)
      if (target.currentHp > 0 && actualDamage > 0 && target.abilities) {
        for (const ab of target.abilities) {
          if (ab.timing === 'on_hit' && Math.random() < (ab.triggerRate || 0)) {
             await showCutIn(target, ab.name);
             
             let counterDmg = 0;
             if (target.id === 7) { // Callum: Blood Explosion
                 counterDmg = Math.floor(target.stats.atk * 1.5);
             } else {
                 let reflectPct = 1.0;
                 if (target.id === 111) reflectPct = 0.3; // アクアバルーン 30%
                 counterDmg = Math.floor(actualDamage * reflectPct);
             }

             attacker.currentHp = Math.max(0, attacker.currentHp - counterDmg);
             logBattleMessage(`<span class="ability">反撃！</span> ${ab.name}！ ${attacker.name} に <span class="damage">${counterDmg}</span> のダメージ！`);
             updateUnitUI(attacker);
             const originalAttackerEl = document.getElementById(`unit-${attacker.battleId}`);
             showDamageNumber(originalAttackerEl, counterDmg);
             playEffect(originalAttackerEl, 'slash');
             if (originalAttackerEl) {
                originalAttackerEl.classList.add('is-taking-damage');
                setTimeout(() => originalAttackerEl.classList.remove('is-taking-damage'), 400);
             }
             if (attacker.currentHp <= 0) {
               await processUnitDeath(attacker);
             }
             await sleep(600 / battleSpeedMultiplier);
          }
        }
      }

        await sleep(600 / battleSpeedMultiplier);

        // 3. Check for 'after_attack' ability (追撃)
        if (target.currentHp > 0 && attacker.currentHp > 0 && attacker.abilities) {
          let chaseAbility = null;
          // ライ・アルバロ (ID:5) の特殊処理
          if (attacker.id === 5) {
            if (attacker.isPassiveActive) { // 八連雷撃斬
              chaseAbility = attacker.abilities[2]; // 八連雷撃斬
            } else { // 雷撃斬
              if (Math.random() < attacker.abilities[0].triggerRate) {
                chaseAbility = attacker.abilities[0]; // 雷撃斬
              }
            }
          }
          // ノアの特殊処理
          else if (attacker.id === 2) {
            const abIndex = attacker.isPassiveActive ? 2 : 0; // ハート・ブレイク or クリスタル・ブレイク
            const ab = attacker.abilities[abIndex];
            if (ab && ab.timing === 'after_attack' && Math.random() < (ab.triggerRate || 0)) {
              chaseAbility = ab;
            }
          } else if (attacker.id === 114 && attacker.isPassiveActive) {
            if (Math.random() < 0.6) { // 嵐呼ぶ剣戟
              chaseAbility = attacker.abilities[1];
            }
          } else {
            // 汎用処理
            for (const ab of attacker.abilities) {
              if (ab.timing === 'after_attack' && Math.random() < (ab.triggerRate || 0)) {
                chaseAbility = ab;
                break;
              }
            }
          }

          if (chaseAbility) {
            if (attacker.id === 5 && attacker.isPassiveActive) { // 八連雷撃斬
              await showCutIn(attacker, chaseAbility.name);
              const chaseProbs = [0.86, 0.74, 0.64, 0.56, 0.50, 0.46];
              for (let i = 0; i < 7; i++) {
                if (target.currentHp <= 0) break;

                const chaseDamage = Math.floor(calculateDamage(attacker, target) * 0.5);
                target.currentHp = Math.max(0, target.currentHp - chaseDamage);
                
                playEffect(targetEl, 'slash');
                logBattleMessage(`<span class="ability">追撃 ${i+1}発目！</span> ${target.name} に <span class="damage">${chaseDamage}</span> のダメージ！`);
                updateUnitUI(target);
                showDamageNumber(targetEl, chaseDamage);
                targetEl.classList.add('is-taking-damage');
                setTimeout(() => targetEl.classList.remove('is-taking-damage'), 400);
                await sleep(400 / battleSpeedMultiplier);

                if (i < 6 && Math.random() > chaseProbs[i]) {
                  break; // Chain broken
                }
              }
            } else if (attacker.id === 114 && attacker.isPassiveActive) { // 嵐呼ぶ剣戟
              await showCutIn(attacker, chaseAbility.name);
              for (let i = 0; i < 3; i++) {
                  if (target.currentHp <= 0) break;
                  const chaseDamage = Math.floor(calculateDamage(attacker, target) * 0.6);
                  target.currentHp = Math.max(0, target.currentHp - chaseDamage);
                  playEffect(targetEl, 'slash');
                  logBattleMessage(`<span class="ability">追撃 ${i+1}発目！</span> ${target.name} に <span class="damage">${chaseDamage}</span> のダメージ！`);
                  updateUnitUI(target);
                  showDamageNumber(targetEl, chaseDamage);
                  targetEl.classList.add('is-taking-damage');
                  setTimeout(() => targetEl.classList.remove('is-taking-damage'), 400);
                  await sleep(400 / battleSpeedMultiplier);
                  if (Math.random() > 0.6) break;
              }
            } else if (attacker.id === 14 && chaseAbility.name === '月輪無双') {
              await showCutIn(attacker, chaseAbility.name);
              for (let i = 0; i < 4; i++) {
                  if (target.currentHp <= 0) break;
                  const chaseDamage = Math.floor(calculateDamage(attacker, target) * 0.8);
                  target.currentHp = Math.max(0, target.currentHp - chaseDamage);
                  playEffect(targetEl, 'slash');
                  logBattleMessage(`<span class="ability">月輪無双 ${i+1}撃目！</span> ${target.name} に <span class="damage">${chaseDamage}</span> のダメージ！`);
                  updateUnitUI(target);
                  showDamageNumber(targetEl, chaseDamage);
                  targetEl.classList.add('is-taking-damage');
                  setTimeout(() => targetEl.classList.remove('is-taking-damage'), 400);
                  await sleep(400 / battleSpeedMultiplier);
                  if (Math.random() > 0.5) break; // 50% chance to continue
              }
            } else { // Single chase attacks
              await showCutIn(attacker, chaseAbility.name);
              let chaseMult = 0.6; // Default for クリスタル・ブレイク
              if (chaseAbility.name === 'ハート・ブレイク') chaseMult = 1.2;
              if (chaseAbility.name === '二段切り') chaseMult = 0.3;
              if (chaseAbility.name === '毒突き') chaseMult = 0.5;
              if (chaseAbility.name === '雷撃斬') chaseMult = 0.5;

              const chaseDamage = Math.floor(calculateDamage(attacker, target) * chaseMult);
              target.currentHp = Math.max(0, target.currentHp - chaseDamage);

              if (chaseAbility && chaseAbility.effect?.type === 'status') {
                  await addStatusEffect(target, chaseAbility.effect.status, chaseAbility.effect.turns);
              }
              playEffect(targetEl, 'slash');
              logBattleMessage(`<span class="ability">追撃！</span> ${chaseAbility.name}！ ${target.name} に <span class="damage">${chaseDamage}</span>${advText} のダメージ！`);
              updateUnitUI(target);
              showDamageNumber(targetEl, chaseDamage, advText.includes('WEAK') ? 'weak' : 'damage');
              targetEl.classList.add('is-taking-damage');
              setTimeout(() => targetEl.classList.remove('is-taking-damage'), 400);
              await sleep(600 / battleSpeedMultiplier);
            }
          }
        }

        // 4. Death Check & Cleanup
        if (target.currentHp <= 0) {
          await processUnitDeath(target);
        }

        } // End of single target logic block
        if (checkWinLoss()) break;
        await sleep(400 / battleSpeedMultiplier);

      } finally {
        if (attackerEl) attackerEl.classList.remove('is-turn-active');
      }
    }
    turnCount++;
    // For simplicity, this simulation runs until one side is defeated.
    // In a real game, this might represent one "round" and the loop would continue.
  }

  document.getElementById('retireBattleBtn').disabled = false;
  document.querySelectorAll('.battle-unit').forEach(el => el.classList.remove('is-attacking'));

  document.getElementById('closeBattleBtn').disabled = false;
}

function checkWinLoss() {
    if (battleState.isFinished) return true;

    const livingEnemies = battleState.enemyUnits.filter(u => u.currentHp > 0).length;
    const livingPlayers = battleState.playerUnits.filter(u => u.currentHp > 0).length;

    let isGameOver = false;

    if (livingEnemies === 0) {
        battleState.isFinished = true;
        isGameOver = true;
        logBattleMessage(`<span class="info">勝利！</span>`);
        
        const mission = battleState.mission;
        const isFirstClear = !missionProgress.has(mission.id);
        const rewardAmount = isFirstClear ? mission.firstTimeReward : mission.reward;

        if (isFirstClear) {
            missionProgress.add(mission.id);
        }
        
        let unlockedCharName = null;
        // Stage 5 (ID: 104) Clear Reward: Iemike (ID: 4)
        if (mission.id === 104 && !playerState.characters[4]) {
            playerState.characters[4] = { level: 1, equippedId: null };
            unlockedCharName = 'いえみけ';
            showToast('「いえみけ」が仲間になりました！');
        }
        // Stage 8 (ID: 107) Clear Reward: Rai Alvaro (ID: 5)
        if (mission.id === 107 && !playerState.characters[5]) {
            playerState.characters[5] = { level: 1, equippedId: null };
            unlockedCharName = 'ライ・アルバロ';
            showToast('「ライ・アルバロ」が仲間になりました！');
        }
        // Stage 10 (ID: 109) Clear Reward: Den Alvaro (ID: 6)
        if (mission.id === 109 && !playerState.characters[6]) {
            playerState.characters[6] = { level: 1, equippedId: null };
            unlockedCharName = 'デン・アルバロ';
            showToast('「デン・アルバロ」が仲間になりました！');
        }
        // Event Stage (ID: 901) Clear Reward: Ridin (ID: 16)
        if (mission.id === 901 && !playerState.characters[16]) {
            playerState.characters[16] = { level: 1, equippedId: null };
            unlockedCharName = 'リディン・イルカイ(過去)';
            showToast('「リディン」が仲間になりました！');
        }

        playerState.rainbowStones += rewardAmount;
        showVictoryScreen(rewardAmount, isFirstClear, unlockedCharName);
    } else if (livingPlayers === 0) {
        battleState.isFinished = true;
        isGameOver = true;
        logBattleMessage(`<span class="info">敗北...</span>`);
        document.getElementById('battleActionBtn').textContent = '閉じる';
        document.getElementById('retireBattleBtn').disabled = true;
        document.getElementById('battleActionBtn').disabled = false;
        document.getElementById('battleActionBtn').onclick = closeBattle;
    }

    if (isGameOver && livingPlayers === 0) document.getElementById('closeBattleBtn').disabled = false;
    return isGameOver;
}

async function showCutIn(unit, abilityName) {
  const overlay = document.getElementById('cutinOverlay');
  const charWrap = document.getElementById('cutinChar');
  const text = document.getElementById('cutinText');

  const imgSrc = unit.useImg ? unit.img : 'C0.svg';
  charWrap.innerHTML = `<img src="${imgSrc}" style="height:100%;width:auto;filter:drop-shadow(0 0 20px var(--accent))">`;
  
  text.textContent = abilityName;

  overlay.classList.add('active');
  await sleep(2400 / battleSpeedMultiplier);
  overlay.classList.remove('active');
  await sleep(400 / battleSpeedMultiplier);
}

async function addStatusEffect(target, type, turns) {
    if (!target || target.currentHp <= 0) return;

    // Ricardo (ID: 8) Passive: Adaptability
    if (target.id === 8) {
        await showCutIn(target, '適応力');
        logBattleMessage(`${target.name}は適応力で状態異常を無効化した！`);
        playEffect(document.getElementById(`unit-${target.battleId}`), 'heal');
        return;
    }

    const existingEffect = target.statusEffects.find(e => e.type === type);
    if (existingEffect) {
        existingEffect.turns = Math.max(existingEffect.turns, turns);
    } else {
        target.statusEffects.push({ type, turns });
    }
    
    const effectInfo = STATUS_EFFECTS[type];
    if (effectInfo) {
        logBattleMessage(`${target.name}は<span class="info">${effectInfo.name}</span>状態になった！`);
    }

    updateUnitUI(target);
}

function selectTarget(battleId) {
    if (battleState.isFinished) return;

    const targetUnit = battleState.enemyUnits.find(u => u.battleId === battleId);
    if (!targetUnit || targetUnit.currentHp <= 0) return;

    // Toggle selection if clicking the same target
    if (battleState.selectedTargetId === battleId) {
        const prevTargetEl = document.getElementById(`unit-${battleState.selectedTargetId}`);
        if (prevTargetEl) prevTargetEl.classList.remove('is-targeted');
        battleState.selectedTargetId = null;
        return;
    }

    // Remove previous target highlight
    if (battleState.selectedTargetId) {
        const prevTargetEl = document.getElementById(`unit-${battleState.selectedTargetId}`);
        if (prevTargetEl) prevTargetEl.classList.remove('is-targeted');
    }

    // Set new target
    battleState.selectedTargetId = battleId;
    const newTargetEl = document.getElementById(`unit-${battleId}`);
    if (newTargetEl) {
        newTargetEl.classList.add('is-targeted');
    }
}

// 戦闘中の動的ステータス計算（パッシブ反映）
function getBattleStats(unit) {
  const s = { ...unit.stats };
  
  // パッシブ: ドラ (ID:1) HP50%以下で攻撃力30%UP
  if (unit.id === 1 && unit.currentHp <= unit.stats.hp * 0.5) {
    s.atk = Math.floor(s.atk * 1.3);
  }

  // パッシブ: ノア (ID:2) HP30%以下で防御力10%UP
  if (unit.id === 2 && unit.currentHp <= unit.stats.hp * 0.3) {
    s.def = Math.floor(s.def * 1.1);
  }

  // パッシブ: 鉄壁 ゴウ (ID:3) 常時ダメージ20%カット
  if (unit.id === 3) {
    s.def = Math.floor(s.def * 1.2); // A different way to think about it
  }

  // パッシブ: いえみけ (ID:4) HP50%以下で防御力40%UP
  if (unit.id === 4 && unit.currentHp <= unit.stats.hp * 0.5) {
    s.def = Math.floor(s.def * 1.4);
  }

  // パッシブ: エマ (ID:10) 厭世開花
  if (unit.id === 10) {
    const lostHpRatio = 1 - (unit.currentHp / unit.stats.hp);
    const multiplier = 1 + (lostHpRatio * 0.5); // Max 1.5x at 0 HP
    s.atk = Math.floor(s.atk * multiplier);
    s.def = Math.floor(s.def * multiplier);
    s.spd = Math.floor(s.spd * multiplier);
  }

  // パッシブ: オリバー (ID:12) フォルテ
  if (unit.id === 12 && unit.currentHp <= unit.stats.hp * 0.5) {
    s.atk = Math.floor(s.atk * 1.3);
  }

  // パッシブ: アスター (ID:114) 嵐呼ぶ剣戟
  if (unit.id === 114 && unit.currentHp <= unit.stats.hp * 0.3) {
    s.atk = Math.floor(s.atk * 1.3);
  }

  // ステータス効果: 衰弱 (HP以外20%ダウン)
  if (unit.statusEffects.some(e => e.type === 'weakness')) {
    s.atk = Math.floor(s.atk * 0.8);
    s.def = Math.floor(s.def * 0.8);
    s.spd = Math.floor(s.spd * 0.8);
  }
  // ステータス効果: 強化 (HP以外20%アップ)
  if (unit.statusEffects.some(e => e.type === 'strengthen')) {
    s.atk = Math.floor(s.atk * 1.2);
    s.def = Math.floor(s.def * 1.2);
    s.spd = Math.floor(s.spd * 1.2);
  }
  
  return s;
}

function getElementalMultiplier(atkElem, defElem) {
  let advantage = 1.0;
  const advantageRules = elementalAdvantage[atkElem];
  if (advantageRules && advantageRules[defElem]) {
    advantage = advantageRules[defElem];
  } else {
    const disadvantageRules = elementalAdvantage[defElem];
    if (disadvantageRules && disadvantageRules[atkElem]) {
      advantage = 1 / disadvantageRules[atkElem];
    }
  }
  return advantage;
}

function calculateDamage(attacker, defender) {
  // パッシブ補正後のステータスを取得
  const atkStats = getBattleStats(attacker);
  const defStats = getBattleStats(defender);

  const advantage = getElementalMultiplier(attacker.element, defender.element);
  
  // 圧縮の札 (ID: 13)
  if (attacker.isAdvantageForced) {
      return Math.floor((atkStats.atk * atkStats.atk) / Math.max(1, defStats.def) * 1.5);
  }

  // ダメージ計算式: 攻撃 * 攻撃 / 防御 * 属性相性
  let damage = Math.floor((atkStats.atk * atkStats.atk) / Math.max(1, defStats.def) * advantage);
  
  // 燃焼による被ダメージ増加
  if (defender.statusEffects.some(e => e.type === 'burn' || e.type === 'poison')) {
    damage = Math.floor(damage * 1.1);
  }

  // Equipment: Damage Cut
  if (defender.equipment && defender.equipment.effect.type === 'dmg_cut') {
      damage = Math.floor(damage * defender.equipment.effect.val);
  }
  // Equipment: Elemental Resistance
  if (defender.equipment && defender.equipment.effect.type === 'elem_res' && defender.equipment.effect.element === attacker.element) {
      damage = Math.floor(damage * defender.equipment.effect.val);
  }

  // パッシブ: 鉄壁 ゴウ (ID:3) 常時ダメージ20%カット
  if (defender.id === 3) {
    damage = Math.floor(damage * 0.8);
  }

  return damage;
}

function updateUnitUI(unit) {
  const unitEl = document.getElementById(`unit-${unit.battleId}`);
  if (!unitEl) return;
  const hpPercent = Math.max(0, (unit.currentHp / unit.stats.hp) * 100);
  unitEl.querySelector('.b-unit-hp-bar').style.width = `${hpPercent}%`;
  unitEl.querySelector('.b-unit-hp-text').textContent = `${unit.currentHp} / ${unit.stats.hp}`;

  // Status effect icons
  const statusContainer = unitEl.querySelector('.b-unit-status-effects');
  if (statusContainer) {
      statusContainer.innerHTML = unit.statusEffects.map(effect => {
          const effectInfo = STATUS_EFFECTS[effect.type];
          if (!effectInfo) return '';
          return `<div class="status-icon" title="${effectInfo.name}: 残り${effect.turns}ターン">
                    ${effectInfo.icon}<span class="turn-counter">${effect.turns}</span>
                  </div>`;
      }).join('');
  }

  // Passive Status Badge Update
  const passiveBadge = unitEl.querySelector('.passive-active-badge');
  if (passiveBadge) {
    let activeText = null;
    // ドラ (ID:1): HP50%以下で覚醒
    if (unit.id === 1 && unit.currentHp <= unit.stats.hp * 0.5) {
      if (unit.abilities && unit.abilities.length > 1) {
        activeText = `🔥 ${unit.abilities[1].name}`;
      }
    } else if (unit.id === 2 && unit.currentHp <= unit.stats.hp * 0.3) {
      // ノア (ID:2): HP30%以下で再生支配
      if (unit.abilities && unit.abilities.length > 1) {
        activeText = `💧 ${unit.abilities[1].name}`;
      }
    } else if (unit.id === 4 && unit.currentHp <= unit.stats.hp * 0.5) {
      // いえみけ (ID:4): HP50%以下で水支配
      if (unit.abilities && unit.abilities.length > 1) {
        activeText = `💧 ${unit.abilities[1].name}`;
      }
    } else if (unit.id === 5 && unit.currentHp <= unit.stats.hp * 0.5) {
      // ライ・アルバロ (ID:5): HP50%以下で雷支配
      if (unit.abilities && unit.abilities.length > 1) {
        activeText = `⚡ ${unit.abilities[1].name}`;
      }
    } else if (unit.id === 114 && unit.currentHp <= unit.stats.hp * 0.3) {
      // アスター (ID:114): HP30%以下で嵐呼ぶ剣戟
      if (unit.abilities && unit.abilities.length > 1) {
        activeText = `⚡ ${unit.abilities[1].name}`;
      }
    }
    if (activeText) {
      passiveBadge.textContent = activeText;
      passiveBadge.classList.add('active');
    } else {
      passiveBadge.classList.remove('active');
    }
  }
}

async function triggerOnBattleStartAbilities() {
    const allUnits = [...battleState.playerUnits, ...battleState.enemyUnits];
    const actionQueue = [];

    // 1. Build the action queue
    for (const unit of allUnits) {
      if (unit.currentHp > 0 && unit.abilities) {
          const startAbility = unit.abilities.find(ab => ab.timing === 'on_battle_start');
          if (startAbility) {
              const rate = startAbility.triggerRate;
              // triggerRateが未定義(100%発動)か、確率チェックをパスした場合にキューに追加
              if (rate === undefined || Math.random() < rate) {
                  actionQueue.push({ unit, ab: startAbility });
              }
          }
      }
    }

    // 2. Sort the queue by speed
    actionQueue.sort((a, b) => b.unit.stats.spd - a.unit.stats.spd);

    // 3. Execute actions
    for (const action of actionQueue) {
        const { unit, ab } = action;
        await showCutIn(unit, ab.name);
        logBattleMessage(`${unit.name}の「${ab.name}」！`);

        const targets = unit.isPlayer ? battleState.enemyUnits : battleState.playerUnits;
        const livingTargets = targets.filter(t => t.currentHp > 0);
        if (livingTargets.length === 0) continue;

        if (unit.id === 112) { // ルイ・ヴォールズの「先手必勝」 (AoE)
            for (const targetUnit of livingTargets) {
                const damage = Math.floor(calculateDamage(unit, targetUnit) * 0.6);
                targetUnit.currentHp = Math.max(0, targetUnit.currentHp - damage);
                logBattleMessage(`${targetUnit.name}に<span class="damage">${damage}</span>のダメージ！`);
                updateUnitUI(targetUnit);
                const targetEl = document.getElementById(`unit-${targetUnit.battleId}`);
                showDamageNumber(targetEl, damage);
                if (targetEl) {
                    targetEl.classList.add('is-taking-skill-damage');
                    setTimeout(() => targetEl && targetEl.classList.remove('is-taking-skill-damage'), 500);
                }
            }
        } else if (unit.id === 114) { // アスター・エクレアの「開闢」 (Single Target)
            const targetUnit = livingTargets[Math.floor(Math.random() * livingTargets.length)];
            const damage = Math.floor(calculateDamage(unit, targetUnit) * (ab.damageMult || 1.2));
            targetUnit.currentHp = Math.max(0, targetUnit.currentHp - damage);
            logBattleMessage(`${targetUnit.name}に<span class="damage">${damage}</span>のダメージ！`);
            if (ab.effect?.type === 'status') {
                await addStatusEffect(targetUnit, ab.effect.status, ab.effect.turns);
            }
            updateUnitUI(targetUnit);
            const targetEl = document.getElementById(`unit-${targetUnit.battleId}`);
            showDamageNumber(targetEl, damage);
            if (targetEl) {
                targetEl.classList.add('is-taking-skill-damage');
                setTimeout(() => targetEl && targetEl.classList.remove('is-taking-skill-damage'), 500);
            }
        }
        else if (unit.id === 16 || unit.id === 106) { // リディン(雷) or シャール(闇) の属性攻撃強化
            const targetElement = unit.id === 16 ? 'thunder' : 'dark';
            const skillName = unit.id === 16 ? '雷攻撃強化' : '闇攻撃強化';
            
            // 味方全体（自分含む）で、指定属性のキャラを対象にする
            const allies = unit.isPlayer ? battleState.playerUnits : battleState.enemyUnits;
            const targets = allies.filter(u => u.currentHp > 0 && u.element === targetElement);
            
            if (targets.length > 0) {
                for (const t of targets) {
                    await addStatusEffect(t, 'strengthen', 5);
                    const tEl = document.getElementById(`unit-${t.battleId}`);
                    playEffect(tEl, 'heal'); // バフエフェクトとしてhealを代用
                }
                logBattleMessage(`${skillName}！味方の${targetElement === 'thunder' ? '雷' : '闇'}属性ユニットが強化された！`);
            }
        }
        
        // Check for deaths after each ability
        for (const t of livingTargets) { if (t.currentHp <= 0) await processUnitDeath(t); }
    }

    checkWinLoss();
}


function closeBattle() {
  document.getElementById('battleOverlay').classList.remove('open');
  // Reset button for next battle
  document.getElementById('retireBattleBtn').disabled = true;
  document.getElementById('battleActionBtn').onclick = runBattleSequence;
  const chapterIndex = storyChapters.findIndex(c => c.missions.some(m => m.id === battleState.mission.id));
  if (chapterIndex > -1) {
    renderMainStoryChapters(); // Go back to chapter list
  } else {
    renderStoryChapters(); // Fallback to main chapter view if something went wrong
  }
  renderCards();
  renderSquad();
  saveGame();
}

}

function closeCodeViewerDirect() {
  document.getElementById('codeViewerOverlay').classList.remove('open');
}

function getSquadData() {
  const data = getSquadData();
  const jsonString = JSON.stringify(data);
  const blob = new Blob([jsonString], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date();
  const dateString = `${date.getFullYear()}${(date.getMonth() + 1).toString().padStart(2, '0')}${date.getDate().toString().padStart(2, '0')}`;
  a.download = `squad_${dateString}.WoF`;
  a.href = url;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function copySquadCode() {
  if (squad.length === 0) {
    showToast('編成が空です。');
    return;
  }
  const data = getSquadData();
  const jsonString = JSON.stringify(data);
  try {
    const base64String = btoa(jsonString);
    navigator.clipboard.writeText(base64String).then(() => {
      showToast('編成コードをクリップボードにコピーしました。');
    }, () => {
      showToast('コピーに失敗しました。');
    });
  } catch (e) {
    showToast('コードの生成に失敗しました。');
    console.error(e);
  }
}

function viewSquadFromCode() {
  const code = document.getElementById('squadCodeViewerTextarea').value.trim();
  const resultContainer = document.getElementById('squadViewerResult');
  resultContainer.innerHTML = '';
  if (!code) {
    showToast('コードを入力してください。');
    return;
  }
  try {
    const jsonString = atob(code);
    const data = JSON.parse(jsonString);

    if (!data || !Array.isArray(data.squad)) {
      throw new Error('Invalid data format');
    }

    let html = '<h4 style="margin-bottom: 12px;">編成プレビュー</h4>';
    data.squad.forEach((charId, i) => {
      const char = units.find(u => u.id === charId);
      if (!char) return;

      // The code doesn't contain level/aura, so we display basic info.
      const equipId = data.equipment ? data.equipment[charId] : null;
      const equip = equipId ? equipmentItems.find(e => e.id === equipId) : null;
      
      html += `
        <div class="squad-slot filled" style="margin-bottom: 6px; cursor: default;">
          <div class="slot-num">${i+1}</div>
          <div class="slot-img-wrap"><img src="${char.useImg ? char.img : 'C0.svg'}" alt="${char.name}"></div>
          <div class="slot-info">
            <div class="slot-name">${char.name}</div>
            <div class="slot-role">${char.roleJp}</div>
          </div>
          ${equip ? `<div class="squad-equip-icon" title="${equip.name}">${equip.icon}</div>` : ''}
        </div>
      `;
    });
    resultContainer.innerHTML = html;
  } catch (err) {
    console.error(err);
    resultContainer.innerHTML = '<p style="color:var(--accent2)">無効な編成コードです。</p>';
  }
}

// ===== SAVE & LOAD =====
function saveGame() {
  const saveData = {
    playerState: playerState,
    missionProgress: [...missionProgress], // Convert Set to Array
    squad: squad,
  };
  localStorage.setItem('soukenWoF_saveData', JSON.stringify(saveData));
  console.log('Game saved!');
}

function loadGame() {
  const savedJSON = localStorage.getItem('soukenWoF_saveData');
  if (savedJSON) {
    const savedData = JSON.parse(savedJSON);
    
    const defaultPlayerState = {
        rainbowStones: 5000,
        characters: { 1: { level: 1, equippedId: null }, 2: { level: 1, equippedId: null } },
    };
    
    playerState.rainbowStones = savedData.playerState.rainbowStones !== undefined ? savedData.playerState.rainbowStones : defaultPlayerState.rainbowStones;
    playerState.characters = savedData.playerState.characters || defaultPlayerState.characters;
    
    // Migration for Aura
    for (let id in playerState.characters) {
        if (playerState.characters[id].aura === undefined) playerState.characters[id].aura = 0;
    }
    
    missionProgress = new Set(savedData.missionProgress || []);
    squad = savedData.squad || [];
    
    console.log('Game loaded from localStorage.');
    showToast('セーブデータをロードしました');
  } else {
    console.log('No save data found. Starting a new game.');
  }
}

function showVictoryScreen(reward, isFirstClear, unlockedCharName = null) {
  const rewardsContainer = document.getElementById('victoryRewards');
  rewardsContainer.innerHTML = `
    <div style="background: rgba(0,0,0,0.2); padding: 16px; border-radius: 8px; border: 1px solid var(--border);">
      <div style="font-size: 14px; color: var(--text-mid); margin-bottom: 8px;">獲得報酬</div>
      <div style="font-size: 24px; font-weight: 700; color: var(--gold); font-family: 'Orbitron';">
        💎 ${reward}
      </div>
      ${unlockedCharName ? `<div style="margin-top:12px;padding-top:8px;border-top:1px solid var(--border);color:var(--accent);font-weight:bold;">${unlockedCharName} が加入！</div>` : ''}
      ${isFirstClear ? '<div style="font-size: 12px; color: var(--accent3); margin-top: 8px;">初回クリアボーナス！</div>' : ''}
    </div>
  `;
  document.getElementById('victoryOverlay').classList.add('open');
}

function closeVictoryModal() {
  document.getElementById('victoryOverlay').classList.remove('open');
  closeBattle();
}

// ===== INIT =====
function initializeGame() {
    loadGame();
    setView('roster');
    renderSquad();
    renderCards();
}

initializeGame();
</script>
